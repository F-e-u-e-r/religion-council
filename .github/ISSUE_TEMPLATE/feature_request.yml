name: Feature request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: What would you like?
      description: Describe the feature or improvement.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why?
      description: What problem does this solve, or what use case does it enable?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Retrieval / search quality
        - New tradition / denomination / thinker
        - Debate flow / moderation
        - Enforcement (B-axis)
        - Corpus / references
        - Developer experience / docs
        - Other
    validations:
      required: true
