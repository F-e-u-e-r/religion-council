name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check generated quote policy surfaces
        run: python scripts/generate_quote_policy.py --check
      - name: Run test suite
        run: python -m unittest discover -s tests -v
