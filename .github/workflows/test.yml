name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development quality tools
        run: python -m pip install -r requirements-dev.txt
      - name: Run Ruff
        run: ruff check .
      - name: Compile Python sources
        run: python -m compileall orchestrator tests scripts examples
      - name: Check generated quote policy surfaces
        run: python scripts/generate_quote_policy.py --check
      - name: Run strict finalization example
        run: python examples/strict-finalization/run_example.py
      - name: Run test suite
        run: python -m unittest discover -s tests -v
